<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Set Your Password — Engine Room</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/responsive.css" />
</head>
<body>

<div class="landing-bg">
  <div class="landing-glow-a"></div>
  <div class="landing-glow-b"></div>

  <div class="landing-card" id="main-card">

    <!-- Logo -->
    <div style="text-align:center;margin-bottom:32px">
      <div style="display:inline-flex;margin-bottom:16px">
        <div class="landing-logo-icon">
          <i data-lucide="dumbbell" style="width:32px;height:32px;color:#fff;stroke-width:2.4"></i>
        </div>
      </div>
      <h1 class="landing-title">Engine<span>Room</span></h1>
    </div>

    <!-- States are swapped in by JS -->
    <div id="state-loading" style="text-align:center;padding:24px 0">
      <span class="spinner" style="width:28px;height:28px;border-width:3px"></span>
      <p style="color:var(--muted-foreground);font-size:14px;margin-top:14px">Verifying your invite…</p>
    </div>

    <div id="state-form" style="display:none">
      <p style="font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px">Welcome! 👋</p>
      <p style="font-size:13px;color:var(--muted-foreground);margin-bottom:24px">Choose a password to activate your account.</p>

      <div class="landing-form-group">
        <label class="landing-label">New Password</label>
        <div class="landing-input-wrap">
          <input type="password" id="pw-input" class="landing-input has-icon" placeholder="Min 6 characters" />
          <button class="landing-eye-btn" id="pw-eye-btn" type="button" tabindex="-1">
            <i data-lucide="eye" id="pw-eye-icon" style="width:16px;height:16px"></i>
          </button>
        </div>
        <p class="landing-error" id="pw-err" style="display:none"></p>
      </div>

      <div class="landing-form-group">
        <label class="landing-label">Confirm Password</label>
        <input type="password" id="cpw-input" class="landing-input" placeholder="Repeat your password" />
        <p class="landing-error" id="cpw-err" style="display:none"></p>
      </div>

      <p class="landing-error" id="global-err" style="display:none;text-align:center;margin-bottom:12px"></p>

      <button class="landing-btn-primary" id="set-pw-btn">
        <span id="btn-text">Set Password & Continue</span>
        <span id="btn-spinner" style="display:none"><span class="spinner"></span></span>
      </button>
    </div>

    <div id="state-done" style="display:none;text-align:center;padding:16px 0">
      <div style="width:64px;height:64px;background:#22c55e22;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px">
        <i data-lucide="check-circle" style="width:32px;height:32px;color:#22c55e"></i>
      </div>
      <p style="font-size:17px;font-weight:700;color:var(--text);margin-bottom:8px">Password set!</p>
      <p style="font-size:13px;color:var(--muted-foreground)">Redirecting you to your dashboard…</p>
    </div>

    <div id="state-error" style="display:none;text-align:center;padding:16px 0">
      <div style="width:64px;height:64px;background:#ef444422;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px">
        <i data-lucide="alert-circle" style="width:32px;height:32px;color:#ef4444"></i>
      </div>
      <p style="font-size:17px;font-weight:700;color:var(--text);margin-bottom:8px">Link expired or invalid</p>
      <p style="font-size:13px;color:var(--muted-foreground);margin-bottom:20px">This invite link has already been used or has expired. Ask your coach to resend the invite.</p>
      <a href="index.html" class="landing-btn-ghost" style="display:inline-flex;text-decoration:none;padding:11px 24px">← Back to sign in</a>
    </div>

  </div>
</div>

<div id="toast-container"></div>

<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/storage.js"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>
lucide.createIcons();

function show(stateId) {
  ['state-loading','state-form','state-done','state-error'].forEach(id => {
    document.getElementById(id).style.display = id === stateId ? '' : 'none';
  });
  lucide.createIcons();
}

// ─── Eye toggle ───────────────────────────────────────────────
const pwInput = document.getElementById('pw-input');
document.getElementById('pw-eye-btn').addEventListener('click', () => {
  const show = pwInput.type === 'password';
  pwInput.type = show ? 'text' : 'password';
  document.getElementById('pw-eye-icon').setAttribute('data-lucide', show ? 'eye-off' : 'eye');
  lucide.createIcons();
});

// ─── Session detection ────────────────────────────────────────
// Supabase v2 puts the tokens in the URL hash after the invite link
// is clicked. onAuthStateChange fires with event 'SIGNED_IN'.
// We just need to wait for it, then let the user set their password.

let sessionReady = false;

sb.auth.onAuthStateChange(async (event, session) => {
  if (sessionReady) return;  // already handled

  if (event === 'SIGNED_IN' && session) {
    sessionReady = true;
    show('state-form');
  }
});

// Fallback: if already signed in (e.g. page refresh after invite)
(async () => {
  const { data } = await sb.auth.getSession();
  if (data.session && !sessionReady) {
    sessionReady = true;
    show('state-form');
    return;
  }
  // If no session after 5 s, the link was invalid
  setTimeout(() => {
    if (!sessionReady) show('state-error');
  }, 5000);
})();

// ─── Set password ──────────────────────────────────────────────
document.getElementById('set-pw-btn').addEventListener('click', setPassword);
document.getElementById('cpw-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') setPassword();
});

async function setPassword() {
  const pw  = document.getElementById('pw-input').value;
  const cpw = document.getElementById('cpw-input').value;
  const pwErr    = document.getElementById('pw-err');
  const cpwErr   = document.getElementById('cpw-err');
  const globalErr= document.getElementById('global-err');

  [pwErr, cpwErr, globalErr].forEach(el => { el.style.display='none'; el.textContent=''; });

  if (!pw)         { pwErr.textContent='Password is required'; pwErr.style.display='block'; return; }
  if (pw.length<6) { pwErr.textContent='Minimum 6 characters'; pwErr.style.display='block'; return; }
  if (pw !== cpw)  { cpwErr.textContent='Passwords do not match'; cpwErr.style.display='block'; return; }

  const btn = document.getElementById('set-pw-btn');
  document.getElementById('btn-text').style.display='none';
  document.getElementById('btn-spinner').style.display='inline';
  btn.disabled = true;

  const { error } = await sb.auth.updateUser({ password: pw });

  if (error) {
    document.getElementById('btn-text').style.display='';
    document.getElementById('btn-spinner').style.display='none';
    btn.disabled = false;
    globalErr.textContent = error.message;
    globalErr.style.display = 'block';
    return;
  }

  // Check what role this user has and redirect accordingly
  const { data: { user } } = await sb.auth.getUser();
  const { data: profile } = await sb.from('profiles').select('role').eq('id', user.id).single();

  show('state-done');

  setTimeout(() => {
    if (profile?.role === 'coach') window.location.href = 'coach.html';
    else window.location.href = 'client.html';
  }, 1800);
}
</script>
</body>
</html>
