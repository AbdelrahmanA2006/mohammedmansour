<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Engine Room — Client</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/responsive.css" />
  <!-- Chart.js for progress graphs -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
</head>
<body>

<div class="app-layout">
  <!-- ── Sidebar ──────────────────────────────────────────────── -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-icon" style="background:#22c55e">
        <i data-lucide="dumbbell" style="width:18px;height:18px;color:#fff"></i>
      </div>
      <div>
        <div class="sidebar-logo-title">Engine Room</div>
        <div class="sidebar-logo-sub">Client Portal</div>
      </div>
    </div>

    <nav class="sidebar-nav" id="client-nav">
      <button class="nav-link active active-green" data-section="overview">
        <i data-lucide="layout-dashboard" style="width:16px;height:16px"></i> Overview
      </button>
      <button class="nav-link" data-section="plan">
        <i data-lucide="clipboard-list" style="width:16px;height:16px"></i> My Plan
      </button>
      <button class="nav-link" data-section="checkin">
        <i data-lucide="check-square" style="width:16px;height:16px"></i> Check-in
      </button>
      <button class="nav-link" data-section="progress">
        <i data-lucide="trending-up" style="width:16px;height:16px"></i> Progress
      </button>
      <button class="nav-link" data-section="messages">
        <i data-lucide="message-square" style="width:16px;height:16px"></i> Messages
      </button>
    </nav>

    <div class="sidebar-footer">
      <button class="sign-out-btn" id="client-signout-btn">
        <i data-lucide="log-out" style="width:16px;height:16px"></i> Sign Out
      </button>
    </div>
  </aside>

  <!-- ── Main content ──────────────────────────────────────────── -->
  <main class="main-content">

    <!-- ════════════════════ OVERVIEW ════════════════════════ -->
    <section class="section active" id="sec-overview">
      <div id="overview-welcome"></div>
      <div id="overview-checkin-due"></div>
      <div class="stat-grid" id="overview-stats"></div>
      <div id="overview-plans"></div>
      <div id="overview-last-checkin"></div>
    </section>

    <!-- ════════════════════ MY PLAN ═════════════════════════ -->
    <section class="section" id="sec-plan">
      <div class="page-header">
        <div class="page-header-left">
          <h1>My Plan</h1>
          <p>Your personalized training and nutrition program.</p>
        </div>
      </div>
      <div id="plan-tabs" class="tabs" style="display:none"></div>
      <div id="plan-content"></div>
    </section>

    <!-- ════════════════════ CHECK-IN ════════════════════════ -->
    <section class="section" id="sec-checkin">
      <div class="page-header">
        <div class="page-header-left">
          <h1>Weekly Check-in</h1>
          <p>Track your progress every week.</p>
        </div>
      </div>
      <div id="checkin-content"></div>
    </section>

    <!-- ════════════════════ PROGRESS ════════════════════════ -->
    <section class="section" id="sec-progress">
      <div class="page-header">
        <div class="page-header-left">
          <h1>Progress</h1>
          <p>Your progress over time.</p>
        </div>
      </div>
      <div class="chart-container">
        <canvas id="weight-chart"></canvas>
      </div>
      <div id="progress-list"></div>
    </section>

    <!-- ════════════════════ MESSAGES ════════════════════════ -->
    <section class="section" id="sec-messages">
      <div class="page-header">
        <div class="page-header-left">
          <h1>Messages</h1>
          <p>Chat with Coach Mohamed Mansour.</p>
        </div>
      </div>

      <div class="chat-wrap">
        <!-- Static: always the coach -->
        <div class="chat-sidebar">
          <div class="chat-sidebar-header">Conversation</div>
          <div class="chat-client-btn active" style="cursor:default">
            <div class="avatar avatar-md" style="background:#3b82f622;color:#3b82f6">C</div>
            <div>
              <div class="chat-client-name">Coach Mohamed Mansour</div>
              <div class="chat-client-goal">Your Coach</div>
            </div>
          </div>
        </div>
        <!-- Chat area -->
        <div class="chat-main" id="client-chat-main">
          <div style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--muted-foreground)">
            Loading…
          </div>
        </div>
      </div>
    </section>

  </main>
</div>

<!-- ══════ LIGHTBOX ══════════════════════════════════════════════ -->
<div class="lightbox" id="lightbox" style="display:none"
  onclick="document.getElementById('lightbox').style.display='none'">
  <img id="lightbox-img" src="" alt="" />
</div>

<!-- Toast container -->
<div id="toast-container"></div>

<!-- Scripts -->
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/storage.js"></script>
<script src="js/supabase.js"></script>
<script src="js/auth.js"></script>
<script src="js/client.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>
lucide.createIcons();

(async () => {
  // Always re-verify against the live Supabase session — never trust a
  // stale localStorage pointer alone for access control.
  const restored = await restoreSession();
  if (!restored || restored.role !== 'client') {
    window.location.href = 'index.html';
    return;
  }
  try {
    await loadAllData();
  } catch (err) {
    toast('Failed to load your data. Please refresh.', 'error');
  }
  initClientApp(restored.id);
})();
</script>
</body>
</html>
